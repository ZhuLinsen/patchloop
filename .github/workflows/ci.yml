name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Configure git identity
        run: |
          git config --global user.name "PatchLoop CI"
          git config --global user.email "patchloop-ci@example.com"

      - name: Compile OpenReview
        working-directory: openreview
        run: python -m compileall -q .

      - name: Test OpenReview
        working-directory: openreview
        run: python -m pytest tests -q

      - name: Compile AutoCode
        working-directory: autocode
        run: python -m compileall -q .

      - name: Test AutoCode
        working-directory: autocode
        run: python -m pytest tests -q

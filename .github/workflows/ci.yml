name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure git identity
        run: |
          git config --global user.name "PatchLoop CI"
          git config --global user.email "patchloop-ci@example.com"

      - name: Test with Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Run suite on Python 3.10
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
          cd openreview
          python -m compileall -q .
          python -m pytest tests -q
          cd ../autocode
          python -m compileall -q .
          python -m pytest tests -q

      - name: Test with Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run suite on Python 3.11
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
          cd openreview
          python -m compileall -q .
          python -m pytest tests -q
          cd ../autocode
          python -m compileall -q .
          python -m pytest tests -q

      - name: Test with Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run suite on Python 3.12
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
          cd openreview
          python -m compileall -q .
          python -m pytest tests -q
          cd ../autocode
          python -m compileall -q .
          python -m pytest tests -q
